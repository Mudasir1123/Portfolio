                        <option value="😢">😢 </option>

                    </select>
                </li> <br>
                <input type="color" onchange="changeColor()" name="" id="">

                <li class="font" onclick="changeStyle()">I</li>
                <li class="font" onclick="changeStyle()">U</li>
            </ul>
            <ul>
                <li><img onclick="setBackground()" src="./img/1.jpg" alt="" width="40px"></li>
                <li><img onclick="setBackground()" src="./img/green-gradient-wavy-background_23-2149140692.avif" alt=""
                        width="40px"></li>
                <li><img onclick="setBackground()"
                        src="./img/black-rough-concrete-wall-background-with-neon-lights-and-glowing-lights-lighting-effect-pink-purple-and-blue-on-empty-cement-wall-photo.jpg"
                        alt="" width="40px"></li>
                <li><img onclick="setBackground()"
                        src="./img/ai-generated-grunge-detailed-texture-background-with-scratches-photo.jpg" alt=""

                       <input type="color" onchange="backColor()">

    <button onclick="createPost()">Post</button>

    <script src="app.js"></script>
</body>

</html>
